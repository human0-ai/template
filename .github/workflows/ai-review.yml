name: AI Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  # contents:write is required to resolve review threads via the GraphQL API
  # (pull-requests:write alone returns "Resource not accessible by integration").
  contents: write
  pull-requests: write
  checks: read

jobs:
  review:
    if: ${{ !github.event.pull_request.draft && !contains(github.event.pull_request.labels.*.name, 'no-ai-review') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ai-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: human0-ai/code-review@main
        with:
          # Provide one of these as a repository secret (Settings → Secrets → Actions).
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          pr_number: ${{ github.event.pull_request.number }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          repo: ${{ github.repository }}
          # Reviewer prompt lives in this repo so you can tune it. Delete this
          # line to use the prompt bundled with the action instead.
          prompt_file: docs/ai-review.md
